<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim":"#00deec","secondary":"#00eefc","on-secondary":"#005359",
                        "on-primary-fixed":"#000000","background":"#0e0e10","secondary-fixed":"#00eefc",
                        "inverse-on-surface":"#565557","tertiary-container":"#ff05e5","tertiary-fixed":"#ff85e4",
                        "inverse-surface":"#fcf8fb","surface":"#0e0e10","surface-bright":"#2c2c2f",
                        "surface-container":"#19191c","surface-variant":"#262528","on-error":"#490013",
                        "surface-tint":"#cf96ff","on-background":"#f9f5f8","surface-dim":"#0e0e10",
                        "on-surface-variant":"#adaaad","surface-container-lowest":"#000000","error":"#ff6e84",
                        "tertiary-fixed-dim":"#ff68e3","outline":"#767577","surface-container-low":"#131315",
                        "surface-container-highest":"#262528","on-tertiary-fixed":"#33002d",
                        "on-tertiary-fixed-variant":"#6d0061","on-surface":"#f9f5f8",
                        "on-primary-container":"#37005f","error-dim":"#d73357","outline-variant":"#48474a",
                        "surface-container-high":"#1f1f22","on-secondary-fixed-variant":"#005e64",
                        "on-tertiary":"#42003a","primary":"#cf96ff","primary-fixed":"#c683ff",
                        "error-container":"#a70138","primary-dim":"#a533ff","tertiary-dim":"#ff59e3",
                        "on-primary":"#480079","tertiary":"#ff59e3","on-tertiary-container":"#1b0017",
                        "inverse-primary":"#8d00e6","on-secondary-fixed":"#003f43",
                        "on-primary-fixed-variant":"#450074","primary-fixed-dim":"#bc6fff",
                        "secondary-container":"#006970","on-secondary-container":"#e3fdff",
                        "on-error-container":"#ffb2b9","primary-container":"#c683ff","secondary-dim":"#00deec"
                    },
                    borderRadius: { DEFAULT:"0.25rem", lg:"0.5rem", xl:"0.75rem", full:"9999px" },
                    fontFamily: { headline:["Space Grotesk"], body:["Inter"], label:["Manrope"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
        .glass-panel { background: rgba(38,37,40,0.6); backdrop-filter: blur(20px); }
        .neon-glow  { box-shadow: 0 0 15px rgba(207,150,255,0.4); }
        .viewport-gradient { background: radial-gradient(circle at 50% 50%, #1f1f22 0%, #0e0e10 100%); }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
            "three/examples/jsm/loaders/OBJLoader.js": "https://unpkg.com/three@0.165.0/examples/jsm/loaders/OBJLoader.js",
            "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body class="bg-background text-on-surface font-body selection:bg-primary/30">

    <!-- Sidebar -->
    <aside class="flex flex-col fixed left-0 top-0 h-screen w-64 border-r border-[#1f1f22]/15 bg-[#131315] z-50">
        <div class="p-6">
            <div class="text-xl font-bold bg-gradient-to-br from-[#cf96ff] to-[#a533ff] bg-clip-text text-transparent font-[Space_Grotesk] tracking-tight">Xemy</div>
            <div class="text-[10px] text-gray-500 font-label tracking-widest mt-1 opacity-70">V0.1 Alpha</div>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a class="flex items-center gap-3 px-4 py-3 text-[#cf96ff] font-bold border-r-2 border-[#cf96ff] bg-[#cf96ff]/5 font-[Space_Grotesk] tracking-tight transition-colors duration-200" href="#">
                <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:text-gray-300 font-[Space_Grotesk] tracking-tight hover:bg-[#1f1f22] transition-colors duration-200" href="#">
                <span class="material-symbols-outlined">inventory_2</span><span>Assets</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:text-gray-300 font-[Space_Grotesk] tracking-tight hover:bg-[#1f1f22] transition-colors duration-200" href="#">
                <span class="material-symbols-outlined">auto_awesome</span><span>Generations</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:text-gray-300 font-[Space_Grotesk] tracking-tight hover:bg-[#1f1f22] transition-colors duration-200" href="#">
                <span class="material-symbols-outlined">settings</span><span>Settings</span>
            </a>
        </nav>
        <div class="p-6 border-t border-outline-variant/10">
            <div class="flex items-center gap-3 px-2">
                <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant/20">
                    <span id="user-initials" class="text-xs font-bold text-primary">?</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xs font-bold" id="user-name">Loading...</span>
                    <span class="text-[10px] text-on-surface-variant" id="user-plan">-</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="ml-64 flex flex-col h-screen">

        <!-- Top Bar -->
        <header class="w-full h-16 sticky top-0 z-50 flex justify-between items-center px-6 bg-[#0e0e10]/60 backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <div class="flex items-center gap-6">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
                    <input class="bg-surface-container-high border-none rounded-lg pl-10 pr-4 py-1.5 text-sm w-64 focus:ring-1 focus:ring-[#cf96ff] transition-all placeholder:text-on-surface-variant/50" placeholder="Search projects..." type="text" />
                </div>
            </div>
            <div class="flex items-center gap-6 font-[Space_Grotesk] text-sm">
                <a class="text-gray-400 hover:text-white transition-opacity" href="#">Docs</a>
                <a class="text-gray-400 hover:text-white transition-opacity" href="#">Community</a>
                <div class="flex items-center gap-4 ml-4 pl-4 border-l border-outline-variant/20">
                    <button class="text-gray-400 hover:text-white transition-opacity"><span class="material-symbols-outlined">notifications</span></button>
                    <button class="text-gray-400 hover:text-white transition-opacity"><span class="material-symbols-outlined">help_outline</span></button>
                </div>
            </div>
        </header>

        <!-- Full-bleed viewport -->
        <div class="flex-1 relative overflow-hidden">
            <section id="viewport-container" class="absolute inset-0 viewport-gradient">

                <!-- CSS grid overlay -->
                <div class="absolute inset-0 pointer-events-none opacity-10"
                    style="background-image:linear-gradient(#48474a 1px,transparent 1px),linear-gradient(90deg,#48474a 1px,transparent 1px);background-size:40px 40px;"></div>

                <!-- Three.js canvas -->
                <canvas id="viewport-canvas" class="absolute inset-0 w-full h-full"></canvas>

                <!-- Loading overlay -->
                <div id="viewport-loader" class="hidden absolute inset-0 flex items-center justify-center bg-background/60 backdrop-blur-sm z-20">
                    <div class="flex flex-col items-center gap-3">
                        <svg class="animate-spin w-8 h-8 text-primary" viewBox="0 0 24 24" fill="none">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                        </svg>
                        <span class="text-xs text-on-surface-variant font-label">Loading model...</span>
                    </div>
                </div>

                <!-- Viewport controls (sits above prompt bar) -->
                <div class="absolute bottom-36 left-1/2 -translate-x-1/2 flex items-center gap-1 bg-surface-container-highest/80 backdrop-blur-md rounded-full border border-outline-variant/30 p-1.5 z-10">
                    <button id="ctrl-camera" class="p-2 hover:bg-primary/20 rounded-full transition-colors text-on-surface" title="Reset Camera">
                        <span class="material-symbols-outlined text-lg">videocam</span>
                    </button>
                    <button id="ctrl-grid" class="p-2 hover:bg-primary/20 rounded-full transition-colors text-on-surface" title="Toggle Grid">
                        <span class="material-symbols-outlined text-lg">grid_on</span>
                    </button>
                    <div class="w-px h-4 bg-outline-variant/30 mx-1"></div>
                    <button id="ctrl-screenshot" class="p-2 hover:bg-primary/20 rounded-full transition-colors text-on-surface" title="Screenshot">
                        <span class="material-symbols-outlined text-lg">screenshot_region</span>
                    </button>
                    <button id="export-btn" class="p-2 hover:bg-primary/20 rounded-full transition-colors text-on-surface" title="Export OBJ">
                        <span class="material-symbols-outlined text-lg">download</span>
                    </button>
                    <button id="ctrl-fullscreen" class="p-2 hover:bg-primary/20 rounded-full transition-colors text-on-surface" title="Fullscreen">
                        <span class="material-symbols-outlined text-lg">open_in_full</span>
                    </button>
                </div>

                <!-- XYZ Gizmo -->
                <div class="absolute top-6 right-6 w-24 h-24 flex items-center justify-center z-10">
                    <div class="relative w-full h-full">
                        <div class="absolute top-1/2 left-0 w-full h-[1px] bg-red-500/40"></div>
                        <div class="absolute top-0 left-1/2 w-[1px] h-full bg-green-500/40"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-4 h-4 rounded-full border-2 border-blue-500/40"></div>
                        </div>
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 text-[10px] text-green-400 font-label">Y</div>
                        <div class="absolute top-1/2 right-0 -translate-y-1/2 text-[10px] text-red-400 font-label">X</div>
                    </div>
                </div>
            </section>

            <!-- Options panel -->
            <div id="options-panel" class="hidden absolute bottom-32 left-1/2 -translate-x-1/2 w-80 bg-surface-container-high border border-outline-variant/20 rounded-2xl p-5 space-y-4 z-50 shadow-2xl">
                <h3 class="text-xs font-bold tracking-widest text-on-surface/80 uppercase">Generation Options</h3>
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] text-on-surface-variant">
                        <label for="opt-guidance">Guidance Scale</label>
                        <span id="guidance-val" class="text-secondary font-bold">15</span>
                    </div>
                    <input id="opt-guidance" type="range" min="1" max="30" value="15" class="w-full accent-primary cursor-pointer" oninput="document.getElementById('guidance-val').textContent=this.value" />
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] text-on-surface-variant mb-1" for="opt-quality">Quality</label>
                    <select id="opt-quality" class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg text-xs py-2 px-3 text-on-surface focus:ring-1 focus:ring-primary/50 cursor-pointer">
                        <option value="fast">Fast (32 steps)</option>
                        <option value="balanced" selected>Balanced (64 steps)</option>
                        <option value="quality">Quality (128 steps)</option>
                    </select>
                </div>
            </div>

            <!-- Prompt bar -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-4rem)] max-w-4xl z-50">
                <div class="glass-panel rounded-2xl border border-outline-variant/20 shadow-2xl p-2 flex items-center gap-3">
                    <div class="flex-1 relative flex items-center">
                        <div class="absolute left-4 w-8 h-8 rounded-full bg-gradient-to-br from-primary/20 to-tertiary/20 flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary text-lg">auto_awesome</span>
                        </div>
                        <input id="prompt-input"
                            class="w-full bg-transparent border-none focus:ring-0 pl-16 pr-4 py-4 text-sm font-body text-on-surface placeholder:text-on-surface-variant/40"
                            placeholder="Describe the 3D model you want to forge..." type="text" />
                    </div>
                    <div class="flex items-center gap-2 pr-2">
                        <button id="options-btn" class="px-4 py-2 text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors">Options</button>
                        <button id="forge-btn" class="neon-glow px-8 py-4 rounded-xl bg-gradient-to-r from-primary to-primary-dim text-on-primary-fixed font-bold text-sm tracking-tight flex items-center gap-2 hover:brightness-110 active:scale-95 transition-all">
                            Forge <span class="material-symbols-outlined text-[18px]">bolt</span>
                        </button>
                    </div>
                </div>
                <div class="mt-3 flex justify-center">
                    <div class="px-4 py-1.5 rounded-full bg-surface-container-low/80 backdrop-blur-sm border border-outline-variant/10 flex items-center gap-2">
                        <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></div>
                        <span id="status-text" class="text-[10px] font-label text-on-surface-variant">Ready to generate</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="workspace.js"></script>
</body>
</html>
